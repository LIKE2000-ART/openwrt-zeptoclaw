name: Build Direct Rust Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust_target: x86_64-unknown-linux-musl
          - arch: aarch64_cortex-a53
            rust_target: aarch64-unknown-linux-musl
          - arch: aarch64_generic
            rust_target: aarch64-unknown-linux-musl
          - arch: arm_cortex-a7
            rust_target: armv7-unknown-linux-musleabihf
          - arch: arm_cortex-a7_neon-vfpv4
            rust_target: armv7-unknown-linux-musleabihf
          - arch: mips_24kc
            rust_target: mips-unknown-linux-musl
          - arch: mipsel_24kc
            rust_target: mipsel-unknown-linux-musl
          - arch: riscv64_riscv64
            rust_target: riscv64gc-unknown-linux-musl

    steps:
      - name: Checkout package repo
        uses: actions/checkout@v6

      - name: Resolve upstream zeptoclaw tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ver="$(sed -n 's|^PKG_VERSION:=||p' openwrt-zeptoclaw/Makefile | head -n1)"
          if [ -z "$ver" ]; then
            echo "Failed to parse PKG_VERSION from openwrt-zeptoclaw/Makefile"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Clone upstream source at tag
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "v${{ steps.ver.outputs.version }}" https://github.com/qhkm/zeptoclaw.git upstream-zeptoclaw

      - name: Apply OpenWrt mips patch
        if: startsWith(matrix.arch, 'mips')
        shell: bash
        run: |
          set -euo pipefail
          cd upstream-zeptoclaw
          patch -p1 < ../openwrt-zeptoclaw/patches/100-portable-atomic-u64-for-mips.patch

      - name: Build binary with OpenWrt SDK linker
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/upstream-zeptoclaw:/work" \
            -w /work \
            -e ARCH="${{ matrix.arch }}" \
            -e RUST_TARGET="${{ matrix.rust_target }}" \
            "openwrt/sdk:${{ matrix.arch }}-openwrt-24.10" \
            bash -lc '
              set -euo pipefail

              apt-get -qq update
              apt-get -qq install -y curl ca-certificates build-essential pkg-config

              if ! command -v rustup >/dev/null 2>&1; then
                curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
              fi
              . "$HOME/.cargo/env"

              LINKER="$(ls /builder/staging_dir/toolchain-*/bin/*-openwrt-linux-*-gcc | head -n1)"
              if [ -z "$LINKER" ]; then
                echo "OpenWrt SDK linker not found"
                exit 1
              fi
              AR="${LINKER%-gcc}-ar"
              TARGET_KEY="$(echo "$RUST_TARGET" | tr "-" "_" | tr "[:lower:]" "[:upper:]")"
              export "CARGO_TARGET_${TARGET_KEY}_LINKER=$LINKER"
              export "CARGO_TARGET_${TARGET_KEY}_AR=$AR"

              if [[ "$ARCH" == mips* ]]; then
                rustup toolchain install nightly --profile minimal --component rust-src
                cargo +nightly build --release --target "$RUST_TARGET" -Z build-std=core,alloc,std,proc_macro,panic_abort --bin zeptoclaw
              else
                rustup target add "$RUST_TARGET"
                cargo build --release --target "$RUST_TARGET" --bin zeptoclaw
              fi
            '

      - name: Pack artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cp "upstream-zeptoclaw/target/${{ matrix.rust_target }}/release/zeptoclaw" "out/zeptoclaw"
          tar -zcf "zeptoclaw-v${{ steps.ver.outputs.version }}-${{ matrix.arch }}.tar.gz" -C out zeptoclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zeptoclaw-v${{ steps.ver.outputs.version }}-${{ matrix.arch }}
          path: zeptoclaw-v${{ steps.ver.outputs.version }}-${{ matrix.arch }}.tar.gz
