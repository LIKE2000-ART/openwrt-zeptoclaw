name: Build Direct Rust Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust_target: x86_64-unknown-linux-musl
          - arch: aarch64_cortex-a53
            rust_target: aarch64-unknown-linux-musl
          - arch: aarch64_generic
            rust_target: aarch64-unknown-linux-musl
          - arch: arm_cortex-a7
            rust_target: armv7-unknown-linux-musleabihf
          - arch: arm_cortex-a7_neon-vfpv4
            rust_target: armv7-unknown-linux-musleabihf
          - arch: mips_24kc
            rust_target: mips-unknown-linux-musl
          - arch: mipsel_24kc
            rust_target: mipsel-unknown-linux-musl
          - arch: riscv64_riscv64
            rust_target: riscv64gc-unknown-linux-musl

    steps:
      - name: Checkout package repo
        uses: actions/checkout@v6

      - name: Resolve upstream zeptoclaw tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ver="$(sed -n 's|^PKG_VERSION:=||p' openwrt-zeptoclaw/Makefile | head -n1)"
          if [ -z "$ver" ]; then
            echo "Failed to parse PKG_VERSION from openwrt-zeptoclaw/Makefile"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Clone upstream source at tag
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "v${{ steps.ver.outputs.version }}" https://github.com/qhkm/zeptoclaw.git upstream-zeptoclaw

      - name: Apply OpenWrt mips patch
        if: startsWith(matrix.arch, 'mips')
        shell: bash
        run: |
          set -euo pipefail
          cd upstream-zeptoclaw
          patch -p1 < ../openwrt-zeptoclaw/patches/100-portable-atomic-u64-for-mips.patch

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install nightly toolchain for mips build-std
        if: startsWith(matrix.arch, 'mips')
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install nightly --profile minimal --component rust-src

      - name: Install riscv64 rust target
        if: matrix.arch == 'riscv64_riscv64'
        shell: bash
        run: |
          set -euo pipefail
          rustup target add riscv64gc-unknown-linux-musl

      - name: Install Zig for riscv64
        if: matrix.arch == 'riscv64_riscv64'
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild for riscv64
        if: matrix.arch == 'riscv64_riscv64'
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-zigbuild --locked

      - name: Install cross
        if: matrix.arch != 'riscv64_riscv64'
        shell: bash
        run: |
          set -euo pipefail
          cargo install cross --locked

      - name: Build binary with cross
        working-directory: upstream-zeptoclaw
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.arch }}" == "riscv64_riscv64" ]]; then
            cargo zigbuild --release --target "${{ matrix.rust_target }}" --bin zeptoclaw
          elif [[ "${{ matrix.arch }}" == mips* ]]; then
            cross +nightly build --release --target "${{ matrix.rust_target }}" -Z build-std=core,alloc,std,proc_macro,panic_abort --bin zeptoclaw
          else
            cross build --release --target "${{ matrix.rust_target }}" --bin zeptoclaw
          fi

      - name: Pack artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cp "upstream-zeptoclaw/target/${{ matrix.rust_target }}/release/zeptoclaw" "out/zeptoclaw"
          tar -zcf "zeptoclaw-v${{ steps.ver.outputs.version }}-${{ matrix.arch }}.tar.gz" -C out zeptoclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zeptoclaw-v${{ steps.ver.outputs.version }}-${{ matrix.arch }}
          path: zeptoclaw-v${{ steps.ver.outputs.version }}-${{ matrix.arch }}.tar.gz
